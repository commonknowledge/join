name: Jest Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_call:

jobs:
  jest-tests:
    name: Jest tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps
        run: yarn install

      - name: Run Jest
        working-directory: packages/join-flow
        run: npm test
